<app-header-component></app-header-component>

<main >
    <div class="button-container d-flex justify-content-end">
        <button class="btn btn-primary m-3" data-bs-toggle="modal" data-bs-target="#createPersonajeModal">Crear
            Personaje</button>
    </div>
    @if(personajeList.length !== 0) {

    <div class="main-container">
        <div class="cards-container row gap-3 d-flex justify-content-center mb-3 px-3 mx-sm-3 ">
            @for (personaje of personajeList; track personaje.id) {
            <div class="card-item card shadow-sm col-lg-3 col-xl-3 col-sm-12 col-md-5 p-0 pb-3  bg-light">
                <img [src]="personaje.imgUrl" [alt]="personaje.name" class="card-img-top p-3" />
                <div class="card-body d-flex flex-column align-items-center">
                    <h6 class="card-title pt-3 fw-bold text-center ">{{personaje.name}}</h6>
                    <h6 class="card-title pb-3 fw-bold text-center ">{{personaje.type}}</h6>
                    <button class="btn btn-primary w-100" data-bs-toggle="modal"
                        data-bs-target="#verDetallePersonajeModal" (click)="selectPersonaje(personaje)">Ver detalle</button>
                </div>
            </div>
            }
        </div>
    </div>
    }
</main>

<app-footer-component></app-footer-component>


<!-- MODAL PARA CREAR PERSONAJE -->
<div class="modal fade" id="createPersonajeModal" #personajeModal tabindex="-1" aria-labelledby="createPersonajeLabel"
    aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="createPersonajeLabel">Crear nuevo Personaje</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <app-nuevo-personaje-component #nuevoPersonaje
                    (onSaveSuccess)="onPersonajeCreated($event)"></app-nuevo-personaje-component>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" class="btn btn-primary" (click)="nuevoPersonaje.savePersonaje()">Guardar</button>
            </div>
        </div>
    </div>
</div>


<!-- MODAL PARA MOSTRAR PERSONAJE DETALLE -->
<div class="modal fade" id="verDetallePersonajeModal" #detailPersonajeModalEl tabindex="-1"
    aria-labelledby="verPersonajeLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="verPersonajeLabel">Ver detalle del Personaje</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <app-personaje-item-component [selectedPersonaje]="selectedPersonaje"
                (deleteRequested)="onDeleteRequested($event)"></app-personaje-item-component>

        </div>
    </div>
</div>
